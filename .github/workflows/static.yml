# though i already have an advice to tweak some of it before committing - cv to mat

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: 'soggy cat'
      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3.1
      - name: Install WebP
        run: |
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get install -y webp
      - name: WebP for images
        run: |
          mkdir -p "soggy cat/webp"
          
          # webp for images
          # this goes into mirror.guweh.com/webp

          find "soggy cat"/* -maxdepth 0 -type f -print0 | xargs -P 4 -0 -I {} bash -euo pipefail -c '
            filename=$(basename "{}")
            dims=($(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of default=nw=1:nk=1 "{}"))
            width=${dims[0]}
            height=${dims[1]}
            cwebp_resize=""
            ffmpeg_resize=""
            if [[ -n "$width" && -n "$height" ]]; then
              if [ "$width" -gt 1024 ] || [ "$height" -gt 1024 ]; then
                if [ "$width" -ge "$height" ]; then
                  cwebp_resize="-resize 1024 0"
                  ffmpeg_resize="-vf scale=1024:-1"
                else
                  cwebp_resize="-resize 0 1024"
                  ffmpeg_resize="-vf scale=-1:1024"
                fi
              fi
            fi
            if ! cwebp -preset photo -mt -quiet -alpha_filter none -noalpha -sharp_yuv -q 70 $cwebp_resize "{}" -o "soggy cat/webp/${filename%.*}.webp"; then
              ffmpeg -v error -i "{}" $ffmpeg_resize -quality 70 -compression_level 6 "soggy cat/webp/${filename%.*}.webp"
            fi
          '
      - name: WebP thumbnails for videos
        run: |
          mkdir -p "soggy cat/webp/vids/"
          
          find "soggy cat/vids"/* -maxdepth 0 -type f -print0 | xargs -P 4 -0 -I {} bash -euo pipefail -c '
            filename=$(basename "{}")
            dims=($(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of default=nw=1:nk=1 "{}"))
            width=${dims[0]}
            height=${dims[1]}
            resize=""
            if [[ -n "$width" && -n "$height" ]]; then
              if [ "$width" -gt 1024 ] || [ "$height" -gt 1024 ]; then
                if [ "$width" -ge "$height" ]; then
                  resize="-vf scale=1024:-1"
                else
                  resize="-vf scale=-1:1024"
                fi
              fi
            fi
            ffmpeg -y -v error -i "{}" -vframes 1 $resize -quality 70 -compression_level 6 "soggy cat/webp/vids/${filename%.*}.webp"
          '
      - name: Make lists
        run: |
          cd 'soggy cat'
          find * -maxdepth 0 -type f | jq -nR '[inputs]' > images.json
          find vids/* -maxdepth 0 -type f | jq -nR '[inputs]' > videos.json
          find webp/* -maxdepth 0 -type f | jq -nR '[inputs]' > webp.json
          find webp/vids/* -maxdepth 0 -type f | jq -nR '[inputs]' > webp-video-thumbnails.json
          jq -s 'add' images.json videos.json > all.json
          jq -s 'add' webp.json webp-video-thumbnails.json > webp-all.json
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'soggy cat'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
